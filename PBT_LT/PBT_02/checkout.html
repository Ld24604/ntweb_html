<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body style="font-family:Arial;background:#fafafa;padding:20px;">
<h1 style="text-align:center;color:darkred;">Thanh toán</h1>

<table style="width:100%;border-collapse:collapse;">
<thead>
<tr>
<th>STT</th><th>Sản phẩm</th><th>Đơn giá</th><th>Số lượng</th><th>Thành tiền</th>
</tr>
</thead>
<tbody>
<tr><td>1</td><td>iPhone 16</td><td>20.000.000</td><td>1</td><td>20.000.000</td></tr>
<tr><td>2</td><td>AirPods Pro</td><td>5.000.000</td><td>1</td><td>5.000.000</td></tr>
<tr><td>3</td><td>Apple Watch</td><td>10.000.000</td><td>1</td><td>10.000.000</td></tr>
</tbody>
<tfoot>
<tr><td colspan="4"><b>Tổng cộng</b></td><td><b>35.000.000</b></td></tr>
</tfoot>
</table>

<form action="#" method="POST" style="background:white;padding:20px;margin-top:20px;border-radius:12px;box-shadow:0 0 10px gray;">
<h2>Thanh toán</h2>
<input type="radio" id="cod" name="pay"><label for="cod">COD</label>
<input type="radio" id="bank" name="pay"><label for="bank">Chuyển khoản</label>
<input type="radio" id="wallet" name="pay"><label for="wallet">Ví điện tử</label><br><br>

<label for="coupon">Mã giảm giá:</label><br>
<input type="text" id="coupon" pattern="SALE[0-9]{4}" placeholder="SALE2026" style="width:100%;padding:8px;"><br><br>

<label for="searchproduct">Tìm sản phẩm:</label><br>
<input list="products" id="searchproduct" placeholder="Nhập tên sản phẩm" style="width:100%;padding:8px;">
<datalist id="products">
<option value="iPhone 16"><option value="AirPods Pro"><option value="Apple Watch">
</datalist><br><br>

<label for="note">Ghi chú:</label><br>
<textarea id="note" rows="3" style="width:100%;padding:8px;" placeholder="Ghi chú đơn hàng"></textarea><br><br>

<h2>Thông tin giao hàng</h2>
<label for="delivery">Ngày giao:</label><br>
<input type="date" id="delivery" min="2026-05-05" style="width:100%;padding:8px;"><br><br>

<label for="time">Khung giờ:</label><br>
<select id="time" style="width:100%;padding:8px;">
<option>Sáng 8-12h</option>
<option>Chiều 14-18h</option>
<option>Tối 18-21h</option>
</select><br><br>

<label for="range">Số ngày giao hàng:</label><br>
<input type="range" id="range" min="1" max="7" step="1"><br><br>

<meter value="70" min="0" max="100"></meter> Điểm tích lũy 70/100<br><br>

<button type="submit" aria-label="Xác nhận đặt hàng" style="padding:10px 20px;">Xác nhận đặt hàng</button>
</form>
</body>
</html>
