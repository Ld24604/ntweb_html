<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Validation Test</title>
</head>
<body style="font-family: Arial; padding: 20px; background:#f4f4f4;">

    <h1 style="color: darkblue;">Kiểm tra HTML5 Validation</h1>

    <form action="#" style="background:white;padding:20px;border-radius:10px;width:400px;box-shadow:0 0 10px gray;">
        <p>Trường hợp 1:</p>
        <input type="text" required value="" placeholder="Bắt buộc nhập" style="width:100%;padding:8px;">

        <p>Trường hợp 2:</p>
        <input type="email" value="abc" style="width:100%;padding:8px;">

        <p>Trường hợp 3:</p>
        <input type="number" min="1" max="10" value="15" style="width:100%;padding:8px;">

        <p>Trường hợp 4:</p>
        <input type="text" pattern="[0-9]{10}" value="abc123" style="width:100%;padding:8px;">

        <p>Trường hợp 5:</p>
        <input type="password" minlength="8" value="123" style="width:100%;padding:8px;">

        <br><br>
        <button type="submit" style="padding:10px 20px;">Submit Test</button>
    </form>
</body>
</html>
